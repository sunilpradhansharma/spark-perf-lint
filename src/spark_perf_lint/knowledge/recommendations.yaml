# =============================================================================
# recommendations.yaml — spark-perf-lint knowledge base
# =============================================================================
#
# Structure
# ---------
# Each entry in the top-level `rules` list describes one lint rule and how to
# fix it.  Fields:
#
#   rule_id              Unique rule identifier, e.g. SPL-D01-001
#   short_recommendation One-line fix summary (displayed inline in terminal output)
#   detailed_recommendation
#                        Multi-sentence paragraph with concrete steps the developer
#                        should follow to resolve the finding.
#   before_code          Anti-pattern snippet that triggers the rule (Python/PySpark)
#   after_code           Fixed snippet that resolves the finding
#   config_changes       Dict of Spark config keys → recommended values.
#                        null when the fix is purely a code change.
#   spark_docs_link      URL to the most relevant Spark documentation page
#   estimated_speedup    Human-readable range, e.g. "2-5x" or "10-100x"
#   effort               One of: CONFIG_ONLY | MINOR_CODE_CHANGE | MAJOR_REFACTOR
#   common_in            Comma-separated list of workload types where this pattern
#                        is frequently seen
#
# Coverage
# --------
# This file currently covers D01 (Cluster Configuration) and D02 (Shuffle).
# D03–D11 recommendations are in separate files added as each dimension ships.
# =============================================================================

rules:

  # ---------------------------------------------------------------------------
  # D01 — Cluster Configuration (SPL-D01-001 through SPL-D01-010)
  # ---------------------------------------------------------------------------

  - rule_id: SPL-D01-001
    short_recommendation: >-
      Set spark.serializer to KryoSerializer for 10x faster serialization and
      3-5x smaller shuffle payloads.
    detailed_recommendation: |
      Spark defaults to Java serialization, which is ~10x slower than Kryo and
      produces serialized objects 3-5x larger. This directly inflates shuffle
      traffic and block-manager memory pressure on every wide transformation.
      Add `.config("spark.serializer", "org.apache.spark.serializer.KryoSerializer")`
      to your SparkSession builder. Optionally register domain classes with
      `spark.kryo.classesToRegister` for maximum efficiency, and set
      `spark.kryo.registrationRequired = false` while migrating to avoid
      ClassNotRegistered exceptions on unregistered types.
    before_code: |
      spark = SparkSession.builder.appName("job").getOrCreate()
    after_code: |
      spark = (
          SparkSession.builder
          .appName("job")
          .config("spark.serializer", "org.apache.spark.serializer.KryoSerializer")
          .getOrCreate()
      )
    config_changes:
      spark.serializer: "org.apache.spark.serializer.KryoSerializer"
      spark.kryo.registrationRequired: "false"
    spark_docs_link: "https://spark.apache.org/docs/latest/tuning.html#data-serialization"
    estimated_speedup: "10x serialization speed; 3-5x shuffle data reduction"
    effort: CONFIG_ONLY
    common_in: "ETL pipelines, ML feature pipelines, streaming jobs"

  - rule_id: SPL-D01-002
    short_recommendation: >-
      Set spark.executor.memory explicitly; the 1 GB default causes OOM and
      disk spill on any production dataset.
    detailed_recommendation: |
      When `spark.executor.memory` is absent, Spark uses 1 GB on YARN/Kubernetes
      cluster managers. This is rarely sufficient: tasks spill shuffle data to
      disk, GC pauses lengthen, and jobs fail with OutOfMemoryError under modest
      data volumes. A practical formula: `(rows_per_task × avg_row_bytes × 3) +
      20% overhead`. Start with 4g for general ETL and increase based on Spark UI
      executor memory metrics. Also set `spark.executor.memoryOverhead` to at
      least 10% of executor memory (minimum 384 MB) to cover JVM off-heap usage.
    before_code: |
      spark = SparkSession.builder.appName("job").getOrCreate()
    after_code: |
      spark = (
          SparkSession.builder
          .appName("job")
          .config("spark.executor.memory", "4g")
          .config("spark.executor.memoryOverhead", "512m")
          .getOrCreate()
      )
    config_changes:
      spark.executor.memory: "4g"
      spark.executor.memoryOverhead: "512m"
    spark_docs_link: "https://spark.apache.org/docs/latest/configuration.html#application-properties"
    estimated_speedup: "Prevents OOM; 2-10x task throughput improvement over disk-spilling baseline"
    effort: CONFIG_ONLY
    common_in: "ETL pipelines, batch aggregation jobs, ML training"

  - rule_id: SPL-D01-003
    short_recommendation: >-
      Set spark.driver.memory to at least 2g; the 1 GB default fails when
      collect() or broadcast variables are used.
    detailed_recommendation: |
      The driver accumulates task result metadata, broadcast variables, and the
      full output of `collect()` / `toPandas()` calls. Spark's 1 GB driver default
      is commonly exceeded by jobs that collect even moderately sized result sets
      or use several broadcast joins simultaneously. A driver OOM kills the entire
      application, wasting all executor work already completed. Set
      `spark.driver.memory` to 2g as a minimum; increase to 4g or more for jobs
      that collect large DataFrames, use many broadcast joins, or maintain a large
      accumulator registry.
    before_code: |
      spark = SparkSession.builder.appName("job").getOrCreate()
    after_code: |
      spark = (
          SparkSession.builder
          .appName("job")
          .config("spark.driver.memory", "2g")
          .getOrCreate()
      )
    config_changes:
      spark.driver.memory: "2g"
    spark_docs_link: "https://spark.apache.org/docs/latest/configuration.html#application-properties"
    estimated_speedup: "Prevents driver OOM; no performance gain when already stable"
    effort: CONFIG_ONLY
    common_in: "Interactive notebooks, jobs using collect() or toPandas(), broadcast-heavy joins"

  - rule_id: SPL-D01-004
    short_recommendation: >-
      Enable spark.dynamicAllocation.enabled to release idle executors and
      improve cluster utilization.
    detailed_recommendation: |
      Without dynamic allocation, Spark holds every requested executor for the
      entire application lifetime, including idle phases between query stages.
      On shared YARN or Kubernetes clusters this blocks other jobs from using
      those resources. Enable dynamic allocation by setting
      `spark.dynamicAllocation.enabled = true` and
      `spark.dynamicAllocation.shuffleTracking.enabled = true` (Spark 3+, removes
      the requirement for an external shuffle service). Tune
      `spark.dynamicAllocation.minExecutors`, `maxExecutors`, and
      `executorIdleTimeout` to match your workload's burst and steady-state
      patterns. Note: do not use dynamic allocation with Spark Structured Streaming
      unless you also configure the external shuffle service.
    before_code: |
      spark = (
          SparkSession.builder
          .config("spark.executor.instances", "10")
          .getOrCreate()
      )
    after_code: |
      spark = (
          SparkSession.builder
          .config("spark.dynamicAllocation.enabled", "true")
          .config("spark.dynamicAllocation.shuffleTracking.enabled", "true")
          .config("spark.dynamicAllocation.minExecutors", "2")
          .config("spark.dynamicAllocation.maxExecutors", "20")
          .getOrCreate()
      )
    config_changes:
      spark.dynamicAllocation.enabled: "true"
      spark.dynamicAllocation.shuffleTracking.enabled: "true"
      spark.dynamicAllocation.minExecutors: "2"
      spark.dynamicAllocation.maxExecutors: "20"
    spark_docs_link: "https://spark.apache.org/docs/latest/job-scheduling.html#dynamic-resource-allocation"
    estimated_speedup: "20-50% cluster cost reduction; reduced queue wait times for concurrent jobs"
    effort: CONFIG_ONLY
    common_in: "Batch ETL jobs, shared YARN/Kubernetes clusters, variable-load pipelines"

  - rule_id: SPL-D01-005
    short_recommendation: >-
      Reduce spark.executor.cores to 4-5; higher values cause HDFS contention
      and GC pressure.
    detailed_recommendation: |
      Each executor core runs one task concurrently, and all cores share the
      executor's JVM heap and HDFS connection pool. The HDFS client handles
      approximately 5 concurrent streams efficiently per DataNode connection;
      beyond that, throughput degrades due to lock contention and thread
      context-switching overhead. More than 5 cores per executor also amplifies
      GC pause duration because all tasks pause together. Set
      `spark.executor.cores` to 4 or 5 and increase the number of executors
      instead to achieve the desired total parallelism. The standard formula:
      `total_executor_cores = num_executors × cores_per_executor`, keeping
      `cores_per_executor` at 4-5.
    before_code: |
      spark = (
          SparkSession.builder
          .config("spark.executor.cores", "10")
          .getOrCreate()
      )
    after_code: |
      spark = (
          SparkSession.builder
          .config("spark.executor.cores", "4")
          .config("spark.executor.instances", "20")  # scale out, not up
          .getOrCreate()
      )
    config_changes:
      spark.executor.cores: "4"
    spark_docs_link: "https://spark.apache.org/docs/latest/hardware-provisioning.html"
    estimated_speedup: "1.5-3x HDFS read throughput; reduced GC pause frequency"
    effort: CONFIG_ONLY
    common_in: "HDFS-backed ETL, large cluster deployments, Parquet/ORC ingestion jobs"

  - rule_id: SPL-D01-006
    short_recommendation: >-
      Raise spark.executor.memoryOverhead to at least 384m to prevent silent
      container kills on YARN/Kubernetes.
    detailed_recommendation: |
      `spark.executor.memoryOverhead` covers off-heap JVM memory: metadata,
      thread stacks, NIO direct buffers, and (for PySpark) the Python worker
      process memory. Spark's internal default is `max(384 MB, 10% of
      executor.memory)`. Explicitly setting it below this floor means YARN or
      Kubernetes will kill the container when RSS memory exceeds the allocation,
      producing a cryptic "executor lost" message with no Java OutOfMemoryError
      in the logs. Set it to at least 384m; for PySpark jobs with UDFs or jobs
      using Arrow-based pandas API, increase to 1g-2g to account for native
      Python process memory.
    before_code: |
      spark = (
          SparkSession.builder
          .config("spark.executor.memoryOverhead", "128m")
          .getOrCreate()
      )
    after_code: |
      spark = (
          SparkSession.builder
          .config("spark.executor.memory", "4g")
          .config("spark.executor.memoryOverhead", "512m")  # >= max(384m, 10% of memory)
          .getOrCreate()
      )
    config_changes:
      spark.executor.memoryOverhead: "512m"
    spark_docs_link: "https://spark.apache.org/docs/latest/running-on-yarn.html#resource-allocation"
    estimated_speedup: "Prevents container kills; no throughput gain when already stable"
    effort: CONFIG_ONLY
    common_in: "YARN/Kubernetes deployments, PySpark UDF jobs, Arrow-enabled pandas API workloads"

  - rule_id: SPL-D01-007
    short_recommendation: >-
      Set spark.python.worker.memory when Python UDFs are present; the 512 MB
      default causes silent task failures on large inputs.
    detailed_recommendation: |
      Each Python UDF task runs in a separate Python worker subprocess per
      executor slot. The worker's memory is bounded by `spark.python.worker.memory`
      (default 512 MB). UDFs that load ML models, process wide pandas DataFrames,
      or call into native libraries routinely exceed this. When a worker is killed
      by the OOM killer, Spark reports a confusing `WorkerLostFailureReason`
      rather than an OutOfMemoryError. Set this config to at least 1g for general
      UDFs; 2g or more for pandas UDFs processing wide DataFrames or heavy ML
      inference. Also ensure `spark.executor.memoryOverhead` accounts for all
      Python workers running concurrently on an executor
      (`cores_per_executor × python_worker_memory`).
    before_code: |
      @udf(returnType=StringType())
      def transform(x):
          return x.strip().upper()

      df.withColumn("clean", transform("raw_col"))
    after_code: |
      spark = (
          SparkSession.builder
          .config("spark.python.worker.memory", "1g")
          .config("spark.executor.memoryOverhead", "1g")
          .getOrCreate()
      )

      @udf(returnType=StringType())
      def transform(x):
          return x.strip().upper()

      df.withColumn("clean", transform("raw_col"))
    config_changes:
      spark.python.worker.memory: "1g"
      spark.executor.memoryOverhead: "1g"
    spark_docs_link: "https://spark.apache.org/docs/latest/configuration.html#execution-behavior"
    estimated_speedup: "Prevents silent task failures; stable throughput under large UDF inputs"
    effort: CONFIG_ONLY
    common_in: "PySpark UDF-heavy ETL, ML inference pipelines, pandas UDF (Arrow) jobs"

  - rule_id: SPL-D01-008
    short_recommendation: >-
      Raise spark.network.timeout to at least 120s; lower values cause false
      executor evictions during GC pauses.
    detailed_recommendation: |
      `spark.network.timeout` is the global deadline for all Spark internal
      network communications: executor heartbeats, shuffle block fetches, and
      block manager transfers. During heavy shuffle phases or full-GC pauses,
      executors legitimately go silent for 30-90 seconds. A timeout shorter than
      120s fires before GC completes, causing Spark to mark healthy executors
      as lost, kill their in-flight tasks, and reschedule all work from scratch —
      wasting significant compute. Remove any override below 120s, or set it
      explicitly to `120s`. For jobs with very long GC pauses (large heap, G1GC),
      consider 300s and tune `spark.executor.heartbeatInterval` to 30s for
      faster *real* failure detection.
    before_code: |
      spark = (
          SparkSession.builder
          .config("spark.network.timeout", "30s")
          .getOrCreate()
      )
    after_code: |
      spark = (
          SparkSession.builder
          .config("spark.network.timeout", "120s")
          .config("spark.executor.heartbeatInterval", "10s")
          .getOrCreate()
      )
    config_changes:
      spark.network.timeout: "120s"
      spark.executor.heartbeatInterval: "10s"
    spark_docs_link: "https://spark.apache.org/docs/latest/configuration.html#networking"
    estimated_speedup: "Eliminates wasted recompute from false-positive executor evictions"
    effort: CONFIG_ONLY
    common_in: "Large shuffle jobs, GC-heavy workloads, jobs on congested network fabrics"

  - rule_id: SPL-D01-009
    short_recommendation: >-
      Enable spark.speculation to automatically re-launch straggler tasks on
      slow nodes or degraded cloud instances.
    detailed_recommendation: |
      Without speculative execution, a single slow node (hardware degradation,
      noisy neighbour, JVM GC skew) can stall an entire stage until its tasks
      finish. `spark.speculation = true` monitors task progress and launches
      duplicate copies of straggler tasks on other executors, using the result
      from whichever finishes first. This is especially valuable on heterogeneous
      cloud hardware where instance performance varies by 20-30%. Tune
      `spark.speculation.multiplier` (default 1.5x — tasks 1.5x slower than the
      median are speculated) and `spark.speculation.quantile` (default 0.75 —
      speculation starts after 75% of tasks in the stage complete). Important:
      enable only for idempotent tasks. Non-idempotent operations (DB writes,
      external API calls) can produce duplicate side-effects.
    before_code: |
      spark = SparkSession.builder.appName("etl").getOrCreate()
    after_code: |
      spark = (
          SparkSession.builder
          .appName("etl")
          .config("spark.speculation", "true")
          .config("spark.speculation.multiplier", "1.5")
          .config("spark.speculation.quantile", "0.9")
          .getOrCreate()
      )
    config_changes:
      spark.speculation: "true"
      spark.speculation.multiplier: "1.5"
      spark.speculation.quantile: "0.9"
    spark_docs_link: "https://spark.apache.org/docs/latest/configuration.html#scheduling"
    estimated_speedup: "2-5x stage speedup on degraded nodes; negligible overhead on healthy clusters"
    effort: CONFIG_ONLY
    common_in: "Long-running batch jobs, cloud spot/preemptible instance workloads, ETL pipelines"

  - rule_id: SPL-D01-010
    short_recommendation: >-
      Tune spark.sql.shuffle.partitions away from the default of 200; it is
      rarely correct for production datasets or clusters.
    detailed_recommendation: |
      The default of 200 shuffle partitions was chosen for a small benchmark
      cluster circa 2014. It is wrong in both directions: too high for small
      datasets (hundreds of tiny shuffle files cause scheduler overhead and slow
      downstream reads) and too low for large datasets (GBs per partition, disk
      spill, OOM). A practical formula: start with
      `max(total_executor_cores * 2, dataset_size_gb * 8)` and validate using
      the Spark UI stage detail — aim for 100-300 MB per post-shuffle partition.
      With Spark 3+ AQE enabled (`spark.sql.adaptive.enabled = true`), you can
      set a higher value and let AQE automatically coalesce small post-shuffle
      partitions at runtime, reducing the risk of over-partitioning.
    before_code: |
      # Default 200 partitions in effect — not set anywhere
      spark = SparkSession.builder.appName("job").getOrCreate()
      result = df.groupBy("customer_id").agg(sum("revenue"))
    after_code: |
      spark = (
          SparkSession.builder
          .appName("job")
          .config("spark.sql.shuffle.partitions", "400")  # tune for cluster
          .config("spark.sql.adaptive.enabled", "true")   # AQE auto-coalesces
          .getOrCreate()
      )
      result = df.groupBy("customer_id").agg(sum("revenue"))
    config_changes:
      spark.sql.shuffle.partitions: "400"  # replace with cluster-tuned value
      spark.sql.adaptive.enabled: "true"
    spark_docs_link: "https://spark.apache.org/docs/latest/sql-performance-tuning.html"
    estimated_speedup: "2-10x on large datasets (avoids spill); 5-20x on small datasets (avoids overhead)"
    effort: CONFIG_ONLY
    common_in: "All Spark SQL jobs, joins, aggregations, window functions"

  # ---------------------------------------------------------------------------
  # D02 — Shuffle (SPL-D02-001 through SPL-D02-008)
  # ---------------------------------------------------------------------------

  - rule_id: SPL-D02-001
    short_recommendation: >-
      Replace groupByKey() with reduceByKey() or aggregateByKey() to enable
      map-side partial aggregation before the shuffle.
    detailed_recommendation: |
      `groupByKey()` collects every value for each key from every partition and
      ships all of them to a single reducer before any aggregation occurs. On a
      10 GB dataset this means 10 GB of shuffle traffic even if the final result
      is kilobytes. `reduceByKey(func)` and `aggregateByKey(zero, seqOp, combOp)`
      apply a partial aggregation on each mapper partition first, then shuffle
      only the reduced values — reducing shuffle data by 10-100x for commutative,
      associative operations (sum, count, max, string concat). For the DataFrame
      API, `groupBy().agg()` already uses partial aggregation internally; prefer
      it over `groupBy().apply()` with a Python function unless you need custom
      group-level logic that cannot be expressed as a built-in aggregation.
    before_code: |
      # Shuffles all raw values across the network
      result = rdd.groupByKey().mapValues(sum)
    after_code: |
      # Partial aggregation happens map-side; only sums are shuffled
      result = rdd.reduceByKey(lambda a, b: a + b)

      # Or for more complex aggregations:
      result = rdd.aggregateByKey(0, lambda acc, v: acc + v, lambda a, b: a + b)
    config_changes: null
    spark_docs_link: "https://spark.apache.org/docs/latest/rdd-programming-guide.html#working-with-key-value-pairs"
    estimated_speedup: "10-100x shuffle data reduction for aggregation workloads"
    effort: MINOR_CODE_CHANGE
    common_in: "RDD-based ETL, word-count style aggregations, legacy PySpark pipelines"

  - rule_id: SPL-D02-002
    short_recommendation: >-
      Set spark.sql.shuffle.partitions away from the default 200; enable AQE
      to auto-tune at runtime.
    detailed_recommendation: |
      The default of 200 shuffle partitions is wrong for most production
      workloads. For small datasets (<1 GB) it produces hundreds of tiny tasks
      with scheduler overhead exceeding actual computation. For large datasets
      (>50 GB) it yields partitions too large to fit in executor memory, causing
      disk spill. Set `spark.sql.shuffle.partitions` explicitly using the formula
      `max(total_executor_cores * 2, dataset_size_gb * 8)`. Then enable Adaptive
      Query Execution (`spark.sql.adaptive.enabled = true`) so Spark can
      automatically coalesce small post-shuffle partitions at runtime, giving you
      a safe ceiling without manual tuning for every query.
    before_code: |
      # 200 shuffle partitions in effect
      spark = SparkSession.builder.getOrCreate()
      df.groupBy("category").agg(count("*")).write.parquet("output/")
    after_code: |
      spark = (
          SparkSession.builder
          .config("spark.sql.shuffle.partitions", "400")
          .config("spark.sql.adaptive.enabled", "true")
          .getOrCreate()
      )
      df.groupBy("category").agg(count("*")).write.parquet("output/")
    config_changes:
      spark.sql.shuffle.partitions: "400"  # replace with cluster-tuned value
      spark.sql.adaptive.enabled: "true"
    spark_docs_link: "https://spark.apache.org/docs/latest/sql-performance-tuning.html#adaptive-query-execution"
    estimated_speedup: "2-10x on large data (no spill); 5-20x on small data (no scheduler overhead)"
    effort: CONFIG_ONLY
    common_in: "All Spark SQL jobs, aggregation pipelines, join-heavy workloads"

  - rule_id: SPL-D02-003
    short_recommendation: >-
      Remove repartition() immediately before join(); join already shuffles on
      the key, making the prior repartition redundant.
    detailed_recommendation: |
      `join()` performs a full shuffle internally to co-locate matching keys on
      the same executor. Calling `repartition()` on the same key immediately
      before `join()` triggers two full shuffles for the same data: once to
      repartition, and again inside the join. This doubles the shuffle I/O for
      that stage with no benefit. Spark 3+ AQE can sometimes merge these via
      exchange reuse, but explicit pre-join repartitioning prevents that
      optimization from applying. Simply remove the `repartition()` call. If you
      need to control the output partition count, set `spark.sql.shuffle.partitions`
      globally, or use `df.hint("repartition", n, "key")` to communicate intent
      to the Catalyst optimizer without guaranteeing a redundant shuffle.
    before_code: |
      # Two full shuffles: repartition + join
      result = orders.repartition(200, "customer_id").join(customers, "customer_id")
    after_code: |
      # One shuffle: join handles co-location internally
      result = orders.join(customers, "customer_id")
    config_changes: null
    spark_docs_link: "https://spark.apache.org/docs/latest/sql-performance-tuning.html"
    estimated_speedup: "2x shuffle I/O reduction for that join stage"
    effort: MINOR_CODE_CHANGE
    common_in: "ETL join pipelines, star-schema fact/dimension joins, multi-table merges"

  - rule_id: SPL-D02-004
    short_recommendation: >-
      Add .limit(n) after orderBy() to activate the TakeOrderedAndProject
      optimization; full global sorts are rarely needed.
    detailed_recommendation: |
      `orderBy()` / `sort()` produces a globally ordered result, requiring a full
      shuffle followed by a range-partition sort across all executors — O(n log n)
      over the total row count. In practice, almost every use case only needs the
      top-N rows. `df.orderBy(col).limit(n)` is recognized by Catalyst as a
      `TakeOrderedAndProject` physical plan that maintains only a top-N heap per
      task, never materializing the full sorted output — O(n log k) complexity.
      If you genuinely need a fully sorted output (e.g., for a downstream
      checkpoint file with strict ordering), use `sortWithinPartitions()` to sort
      each partition independently and cheaply, then write the output; downstream
      readers can merge-sort at read time if needed.
    before_code: |
      # Full global sort — shuffles and sorts every row
      top_customers = df.orderBy("revenue", ascending=False)
    after_code: |
      # TakeOrderedAndProject — heap of 100 rows per task, no full sort
      top_customers = df.orderBy("revenue", ascending=False).limit(100)

      # For partition-local ordering (no global shuffle):
      # df.sortWithinPartitions("revenue", ascending=False)
    config_changes: null
    spark_docs_link: "https://spark.apache.org/docs/latest/sql-ref-syntax-qry-select-orderby.html"
    estimated_speedup: "O(n log n) → O(n log k); 10-1000x for large n with small k"
    effort: MINOR_CODE_CHANGE
    common_in: "Reporting queries, top-N analytics, leaderboard computations, ranking pipelines"

  - rule_id: SPL-D02-005
    short_recommendation: >-
      Apply filter() and select() before distinct() to reduce the shuffle
      payload; avoid deduplicating the full dataset.
    detailed_recommendation: |
      `distinct()` is equivalent to `groupBy(*all_columns).count()` — it shuffles
      every row across the network to detect duplicates. On a 100 M-row wide table
      with no prior filtering, this is a full O(n) shuffle of the entire dataset,
      including columns you may not need. Two optimizations reduce the cost
      significantly: (1) Apply `filter()` / `where()` before `distinct()` to
      reduce the number of rows entering the shuffle. (2) Apply `select()` before
      `distinct()` to drop unused columns, reducing the serialized row size. If
      you only need distinct values of a few columns, use
      `dropDuplicates(["col1", "col2"])` which is more explicit and avoids
      shuffling the full row width.
    before_code: |
      # Shuffles all 50 columns of the full table
      distinct_ids = events_df.distinct()
    after_code: |
      # Filter first to reduce rows; select to reduce columns; then deduplicate
      distinct_ids = (
          events_df
          .filter("event_date > '2024-01-01'")
          .select("user_id", "event_type")
          .distinct()
      )

      # Or for column-subset deduplication:
      # events_df.dropDuplicates(["user_id", "event_type"])
    config_changes: null
    spark_docs_link: "https://spark.apache.org/docs/latest/api/python/reference/pyspark.sql/api/pyspark.sql.DataFrame.distinct.html"
    estimated_speedup: "2-20x depending on filter selectivity and column width reduction"
    effort: MINOR_CODE_CHANGE
    common_in: "Deduplication ETL, event stream processing, CDC pipelines, data quality checks"

  - rule_id: SPL-D02-006
    short_recommendation: >-
      Replace coalesce() after a shuffle with repartition() to maintain even
      data distribution; coalesce creates unbalanced tasks.
    detailed_recommendation: |
      `coalesce(n)` merges partitions without a shuffle by assigning multiple
      existing partitions to fewer tasks. When applied after a shuffle operation
      (groupBy, join, orderBy, distinct, repartition), the resulting tasks are
      highly unbalanced: some process multiple shuffle output partitions while
      others process one. This creates long-tail stragglers that stall the stage.
      If the goal is to reduce output file count, use `repartition(n)` instead
      — it shuffles data evenly across the target partitions. Better still, set
      `spark.sql.shuffle.partitions` to the desired target so the preceding
      shuffle already produces the right partition count, eliminating the need
      for a post-shuffle repartition entirely.
    before_code: |
      # coalesce after groupBy creates unbalanced partitions
      result = (
          df.groupBy("region")
          .agg(sum("sales").alias("total"))
          .coalesce(10)
      )
    after_code: |
      # repartition shuffles evenly; or tune spark.sql.shuffle.partitions directly
      result = (
          df.groupBy("region")
          .agg(sum("sales").alias("total"))
          .repartition(10)
      )
    config_changes: null
    spark_docs_link: "https://spark.apache.org/docs/latest/api/python/reference/pyspark.sql/api/pyspark.sql.DataFrame.coalesce.html"
    estimated_speedup: "Eliminates straggler tasks; consistent stage completion time"
    effort: MINOR_CODE_CHANGE
    common_in: "ETL output sinks, small-file reduction pipelines, post-aggregation writes"

  - rule_id: SPL-D02-007
    short_recommendation: >-
      Insert cache() or checkpoint() between sequential shuffle operations to
      truncate lineage and prevent redundant re-execution.
    detailed_recommendation: |
      Each wide transformation (join, groupBy, orderBy, distinct, repartition)
      triggers a full shuffle stage. When multiple such operations are chained
      without materializing the intermediate result, Spark must re-execute the
      entire preceding lineage if any executor fails mid-sequence. The query
      plan also grows deeply nested, making debugging difficult. Inserting
      `df.cache()` between shuffle stages materializes the intermediate result
      in memory, truncates the lineage, and provides a checkpoint for failure
      recovery. Use `df.checkpoint()` (with a configured checkpoint directory)
      for long lineages or when executor memory is tight. Also check whether
      a `filter()` can be applied between the shuffles to reduce the data volume
      entering the second shuffle.
    before_code: |
      # Three shuffle stages with no materialization break
      df2 = df.groupBy("category").agg(sum("amount").alias("total"))
      df3 = df2.join(lookup_df, "category")
      df4 = df3.orderBy("total", ascending=False)
      df4.write.parquet("output/")
    after_code: |
      # Materialize after the first shuffle to truncate lineage
      df2 = df.groupBy("category").agg(sum("amount").alias("total")).cache()
      df2.count()  # trigger materialization

      df3 = df2.join(lookup_df, "category")
      df4 = df3.orderBy("total", ascending=False)
      df4.write.parquet("output/")

      df2.unpersist()  # release memory when done
    config_changes: null
    spark_docs_link: "https://spark.apache.org/docs/latest/rdd-programming-guide.html#rdd-persistence"
    estimated_speedup: "Prevents full lineage re-execution on failure; 2-5x faster recovery"
    effort: MINOR_CODE_CHANGE
    common_in: "Complex multi-stage ETL, iterative ML preprocessing, multi-join pipelines"

  - rule_id: SPL-D02-008
    short_recommendation: >-
      Set spark.shuffle.file.buffer to 1m to reduce shuffle-write syscall
      count by up to 32x versus the 32 KB default.
    detailed_recommendation: |
      `spark.shuffle.file.buffer` controls the in-memory write buffer used when
      each map task writes its shuffle output files. Spark's default is 32 KB,
      set conservatively for memory-constrained environments. At 32 KB, a task
      writing 32 MB of shuffle data issues ~1000 `write()` syscalls; at 1 MB,
      only ~32 syscalls. The memory overhead is negligible: one 1 MB buffer per
      active shuffle map task. For shuffle-heavy workloads (many groupBy/join
      operations), this reduction in syscall overhead is visible as shorter
      shuffle-write times in the Spark UI Stage Detail page. Pair this with
      `spark.shuffle.io.preferDirectBufs = true` to use off-heap (direct)
      NIO buffers for shuffle reads, reducing GC pressure during shuffle fetch.
    before_code: |
      spark = (
          SparkSession.builder
          .config("spark.shuffle.file.buffer", "32k")  # Spark default
          .getOrCreate()
      )
    after_code: |
      spark = (
          SparkSession.builder
          .config("spark.shuffle.file.buffer", "1m")
          .config("spark.shuffle.io.preferDirectBufs", "true")
          .getOrCreate()
      )
    config_changes:
      spark.shuffle.file.buffer: "1m"
      spark.shuffle.io.preferDirectBufs: "true"
    spark_docs_link: "https://spark.apache.org/docs/latest/configuration.html#shuffle-behavior"
    estimated_speedup: "Up to 32x reduction in shuffle-write syscall count"
    effort: CONFIG_ONLY
    common_in: "Shuffle-heavy ETL, multi-join pipelines, large groupBy aggregations"

  # ---------------------------------------------------------------------------
  # D03 — Joins (SPL-D03-001 through SPL-D03-010)
  # ---------------------------------------------------------------------------

  - rule_id: SPL-D03-001
    short_recommendation: >-
      Replace crossJoin() / join(how='cross') with an explicit join key;
      cartesian products grow as O(n²) and almost always indicate a logic error.
    detailed_recommendation: |
      A cross join multiplies every row in the left DataFrame with every row in
      the right DataFrame. Two DataFrames of 10 M rows each produce a 100-trillion-
      row result — enough to exhaust cluster memory and run indefinitely. Spark does
      not warn when a join key is accidentally omitted; it silently upgrades the plan
      to a cartesian product. Add the correct join key:
      `df.join(other, on='key_column', how='inner')`. If a cross product is
      genuinely needed (e.g., generating all combinations from a tiny reference
      table of < 1,000 rows), wrap the smaller side in `broadcast()` and document
      the intent explicitly so reviewers understand it is intentional.
    before_code: |
      # Accidental cross join — O(n²) rows!
      result = orders_df.crossJoin(products_df)
    after_code: |
      # Explicit join key — only matching rows are returned
      result = orders_df.join(products_df, on='product_id', how='inner')
    config_changes: null
    spark_docs_link: "https://spark.apache.org/docs/latest/api/python/reference/pyspark.sql/api/pyspark.sql.DataFrame.crossJoin.html"
    estimated_speedup: "Unbounded; cross join can produce trillions of rows vs thousands with a key"
    effort: MINOR_CODE_CHANGE
    common_in: "ETL pipelines, data exploration notebooks, schema migration scripts"

  - rule_id: SPL-D03-002
    short_recommendation: >-
      Wrap small lookup DataFrames in broadcast() to eliminate the shuffle on
      both sides of the join.
    detailed_recommendation: |
      When one side of a join is significantly smaller than the other (a typical
      fact-dimension or fact-lookup pattern), Spark can broadcast the small table
      to every executor as an in-memory hash map, eliminating the shuffle entirely.
      Without a broadcast hint, Spark defaults to a sort-merge join, which shuffles
      both DataFrames across the network. Use `df.join(broadcast(small_df), 'key')`
      or `df.join(small_df.hint("broadcast"), 'key')`. Spark's
      `spark.sql.autoBroadcastJoinThreshold` (default 10 MB) auto-broadcasts tables
      below the threshold, but for tables slightly above it or when auto-broadcast
      is disabled, an explicit hint is the only way to force broadcast semantics.
      With AQE enabled, also set `spark.sql.adaptive.autoBroadcastJoinThreshold`
      to a higher value (e.g., 100 MB) to let AQE promote larger tables at runtime.
    before_code: |
      from pyspark.sql.functions import broadcast

      # Both sides shuffled — sort-merge join
      result = orders_df.join(product_lookup, 'product_id')
    after_code: |
      from pyspark.sql.functions import broadcast

      # product_lookup broadcast to every executor — zero shuffle
      result = orders_df.join(broadcast(product_lookup), 'product_id')
    config_changes:
      spark.sql.adaptive.autoBroadcastJoinThreshold: "104857600"  # 100 MB
    spark_docs_link: "https://spark.apache.org/docs/latest/sql-performance-tuning.html#broadcast-hint-for-sql-queries"
    estimated_speedup: "10-100x for small lookups; eliminates shuffle on both sides"
    effort: MINOR_CODE_CHANGE
    common_in: "Star-schema ETL, fact-dimension joins, enrichment pipelines, ML feature joins"

  - rule_id: SPL-D03-003
    short_recommendation: >-
      Remove spark.sql.autoBroadcastJoinThreshold = -1; it disables all
      broadcast joins and forces sort-merge on every join, including tiny lookups.
    detailed_recommendation: |
      Setting `spark.sql.autoBroadcastJoinThreshold` to `-1` completely disables
      Spark's automatic broadcast join optimization. Every join — including those
      on tiny reference tables with a few hundred rows — falls back to a full
      sort-merge join, shuffling both sides across the network. This setting was
      sometimes applied as a workaround for a broadcast garbage-collection race
      condition fixed in Spark 2.4+; there is almost never a valid reason to use
      it in modern deployments. Remove the override entirely to restore the default
      10 MB threshold, or set a higher value (e.g., `10485760` for 10 MB, or
      `104857600` for 100 MB). If specific joins cause OOM due to over-eager
      broadcasting, use `df.hint("merge")` on those individual joins to force
      sort-merge without disabling broadcast globally.
    before_code: |
      spark = (
          SparkSession.builder
          .config("spark.sql.autoBroadcastJoinThreshold", "-1")  # disables all broadcasts
          .getOrCreate()
      )
    after_code: |
      spark = (
          SparkSession.builder
          .config("spark.sql.autoBroadcastJoinThreshold", "10485760")  # 10 MB default
          .getOrCreate()
      )
      # For specific joins that should not broadcast:
      # df.join(large_df.hint("merge"), 'key')
    config_changes:
      spark.sql.autoBroadcastJoinThreshold: "10485760"
    spark_docs_link: "https://spark.apache.org/docs/latest/configuration.html#execution-behavior"
    estimated_speedup: "Restores broadcast optimization; 10-100x for joins on small tables"
    effort: CONFIG_ONLY
    common_in: "Any codebase with join-heavy queries, legacy Spark 2.x migrations"

  - rule_id: SPL-D03-004
    short_recommendation: >-
      Apply filter() and select() before join() to reduce shuffle payload;
      joining full unfiltered tables wastes all rows and all columns in network I/O.
    detailed_recommendation: |
      Joining full tables without projecting or filtering first forces Spark to
      shuffle all rows and all columns of both DataFrames across the network. Two
      500 GB tables joined without any filtering = 1 TB of shuffle traffic just to
      materialize the join keys. A `filter()` that removes 90% of rows before
      the join reduces shuffle data by the same fraction. `select()` before join
      is equally valuable: omitting wide columns not needed in the join result
      prevents those bytes from being serialized, transferred, and deserialized
      on every shuffle node. On tables with hundreds of columns this is often
      the single biggest win available. The golden rule: push predicates and
      projections as close to the data source as possible.
    before_code: |
      # Full 500 GB table shuffled
      events = spark.read.parquet('s3://datalake/events')
      result = events.join(users, 'user_id')
    after_code: |
      # Filter first (90% row reduction), select only needed columns (80% width reduction)
      events = (
          spark.read.parquet('s3://datalake/events')
          .filter("event_date >= '2024-01-01'")
          .select('user_id', 'event_type', 'event_date')
      )
      result = events.join(users.select('user_id', 'name', 'region'), 'user_id')
    config_changes: null
    spark_docs_link: "https://spark.apache.org/docs/latest/sql-performance-tuning.html"
    estimated_speedup: "10-100x shuffle reduction when large fractions of rows/columns are pruned"
    effort: MINOR_CODE_CHANGE
    common_in: "Datalake ETL, wide-table analytics, multi-year history joins"

  - rule_id: SPL-D03-005
    short_recommendation: >-
      Add explicit cast() when joining on columns with different names to
      prevent silent type-mismatch bugs or empty join output.
    detailed_recommendation: |
      When joining on a condition like `df1.order_id == df2.id`, Spark implicitly
      casts one column to match the other's type. If `order_id` is `LongType` and
      `id` is `StringType`, the implicit coercion may produce zero matching rows
      silently — integer `123` never equals string `'123'` under all coercion
      rules, and the rules vary between Spark versions. This is especially risky
      when columns originate from JSON/CSV sources with inferred schemas or when
      column names differ between tables in a star schema. Always add explicit
      `cast()` to document the intended types: `df1.join(df2, df1.order_id.cast('long')
      == df2.id.cast('long'))`. Alternatively, rename one column with
      `withColumnRenamed()` so a simple string key can be used, which avoids
      the comparison expression entirely.
    before_code: |
      # Implicit type coercion — may silently produce 0 rows if types differ
      result = df1.join(df2, df1.order_id == df2.id)
    after_code: |
      # Explicit cast — behavior is clear and version-stable
      result = df1.join(df2, df1.order_id.cast('long') == df2.id.cast('long'))

      # Or rename to use a safe string key:
      # result = df1.join(df2.withColumnRenamed('id', 'order_id'), 'order_id')
    config_changes: null
    spark_docs_link: "https://spark.apache.org/docs/latest/sql-ref-ansi-compliance.html"
    estimated_speedup: "Correctness fix; prevents empty output or wrong results from type mismatch"
    effort: MINOR_CODE_CHANGE
    common_in: "Star-schema joins, CSV/JSON ingest pipelines, schema evolution scenarios"

  - rule_id: SPL-D03-006
    short_recommendation: >-
      Broadcast small dimension tables and enable CBO when chaining 3+ joins;
      each unbroadcast join adds a full shuffle stage.
    detailed_recommendation: |
      In a star-schema join pattern, every non-broadcast join triggers a full
      shuffle. Three consecutive sort-merge joins on different keys produce three
      independent shuffle stages, each reading and writing the full intermediate
      dataset. Reduce cost with these strategies: (1) Wrap any dimension under the
      broadcast threshold in `broadcast()` to eliminate its shuffle entirely.
      (2) Enable Cost-Based Optimization — `spark.sql.cbo.enabled = true` and
      `spark.sql.statistics.histogram.enabled = true` — so Catalyst can reorder
      joins to minimize intermediate result size. (3) If all joins share a common
      key, one upfront `repartition('key')` makes subsequent joins local.
      (4) Apply aggressive `filter()` before the first join to reduce the base row
      count flowing through every subsequent stage.
    before_code: |
      # Three sort-merge joins — three full shuffles
      result = (
          facts
          .join(dim_a, 'key_a')
          .join(dim_b, 'key_b')
          .join(dim_c, 'key_c')
      )
    after_code: |
      from pyspark.sql.functions import broadcast

      # Broadcast small dimensions — eliminates their shuffle stages
      result = (
          facts
          .join(broadcast(dim_a), 'key_a')
          .join(broadcast(dim_b), 'key_b')
          .join(broadcast(dim_c), 'key_c')
      )
    config_changes:
      spark.sql.cbo.enabled: "true"
      spark.sql.statistics.histogram.enabled: "true"
    spark_docs_link: "https://spark.apache.org/docs/latest/sql-performance-tuning.html#join-strategy-hints-for-sql-queries"
    estimated_speedup: "Eliminates 1-3 shuffle stages; 3-10x for star-schema patterns"
    effort: MINOR_CODE_CHANGE
    common_in: "Star-schema ETL, data warehouse pipelines, multi-dimension analytical queries"

  - rule_id: SPL-D03-007
    short_recommendation: >-
      Replace self-joins with Window functions; self-joins shuffle the same
      dataset twice while window functions require no cross-node data transfer.
    detailed_recommendation: |
      A self-join (joining a DataFrame to itself) doubles the shuffle cost: both
      sides of the join are the same data, so Spark serializes, shuffles, and
      deserializes the dataset twice. Most self-join patterns can be rewritten
      as a single Window function pass with no shuffle at all. Common rewrites:
      running totals and moving averages use `sum(col).over(window)`;
      lead/lag comparisons use `lag(col, 1).over(window)`;
      rank-within-group uses `rank().over(Window.partitionBy().orderBy())`;
      deduplication uses `row_number().over(...) == 1`. Window functions operate
      within each partition and avoid both the cross-node data transfer and the
      row duplication that a self-join produces. Import `Window` from
      `pyspark.sql.window` and use `partitionBy()` + `orderBy()` to define the
      window frame.
    before_code: |
      # Self-join to compute lag — shuffles the same data twice
      df_with_prev = df.join(
          df.withColumnRenamed('value', 'prev_value')
            .withColumnRenamed('ts', 'prev_ts'),
          on=(df.key == df.prev_key),
          how='inner'
      )
    after_code: |
      from pyspark.sql import Window
      from pyspark.sql.functions import lag

      # Window function — partition-local, zero cross-node transfer
      w = Window.partitionBy('key').orderBy('ts')
      df_with_prev = df.withColumn('prev_value', lag('value', 1).over(w))
    config_changes: null
    spark_docs_link: "https://spark.apache.org/docs/latest/api/python/reference/pyspark.sql/api/pyspark.sql.functions.lag.html"
    estimated_speedup: "2x shuffle data reduction; window functions avoid all cross-node transfer"
    effort: MAJOR_REFACTOR
    common_in: "Time-series analytics, sessionization, deduplication, ranking pipelines"

  - rule_id: SPL-D03-008
    short_recommendation: >-
      Move join() outside the loop and union all right-side inputs into a
      single DataFrame; each loop iteration currently triggers a full shuffle.
    detailed_recommendation: |
      Calling `join()` inside a Python `for` or `while` loop does not accumulate
      rows iteratively — it builds a new query plan on each iteration and triggers
      a full shuffle every time the loop body executes. With 100 loop iterations
      each joining a 10 GB table, total shuffle I/O is 1 TB even if the final
      result is small. The query plan also grows linearly with loop count, causing
      plan serialization overhead and stack overflows in Catalyst for large iteration
      counts. The correct pattern: collect all loop values into a single DataFrame
      and perform one join. For date ranges, use `filter(col('date').between(start,
      end))` rather than looping over individual dates. For a list of IDs,
      use `spark.createDataFrame([(id,) for id in ids], ['id'])` and join once.
    before_code: |
      result = base_df
      for date in date_list:
          daily = spark.read.parquet(f's3://bucket/events/{date}')
          result = result.join(daily, 'user_id')  # new shuffle per iteration!
    after_code: |
      # Load all dates in one read and join once
      all_events = spark.read.parquet('s3://bucket/events').filter(
          col('date').between(date_list[0], date_list[-1])
      )
      result = base_df.join(all_events, 'user_id')
    config_changes: null
    spark_docs_link: "https://spark.apache.org/docs/latest/rdd-programming-guide.html#resilient-distributed-datasets-rdds"
    estimated_speedup: "N-fold reduction where N = loop iterations; from hours to minutes"
    effort: MAJOR_REFACTOR
    common_in: "Date-range batch jobs, per-entity enrichment loops, iterative join pipelines"

  - rule_id: SPL-D03-009
    short_recommendation: >-
      Add fillna() or dropna() after a left join to handle nulls explicitly;
      unhandled nulls propagate silently and corrupt aggregations.
    detailed_recommendation: |
      A left join always produces `null` values for right-side columns when no
      matching row exists. Unhandled nulls silently corrupt downstream operations:
      `count('column')` returns fewer rows than `count('*')` because nulls are
      excluded; `sum('amount')` skips null rows, producing a wrong total;
      `filter(col > 0)` silently drops all unmatched rows; Parquet writes with
      NOT NULL constraints fail at write time. Use `fillna(default_dict)` to
      substitute sensible defaults for optional join columns, `dropna(subset=
      ['required_col'])` to explicitly discard rows that failed to match, or
      `isNotNull()` / `isNull()` filters to separate matched from unmatched rows.
      Explicit null handling documents the intended behavior and surfaces data
      quality issues early rather than silently corrupting downstream consumers.
    before_code: |
      # Nulls silently propagate to all downstream operations
      result = customers.join(orders, 'customer_id', 'left')
      total = result.groupBy('region').agg(sum('order_amount'))  # wrong totals!
    after_code: |
      # Handle nulls explicitly after the left join
      result = (
          customers
          .join(orders, 'customer_id', 'left')
          .fillna({'order_amount': 0, 'order_status': 'no_order'})
      )
      total = result.groupBy('region').agg(sum('order_amount'))
    config_changes: null
    spark_docs_link: "https://spark.apache.org/docs/latest/api/python/reference/pyspark.sql/api/pyspark.sql.DataFrame.fillna.html"
    estimated_speedup: "Correctness fix; prevents silent data quality bugs in aggregations"
    effort: MINOR_CODE_CHANGE
    common_in: "Customer 360 pipelines, optional enrichment joins, CDC merge operations"

  - rule_id: SPL-D03-010
    short_recommendation: >-
      Enable spark.sql.cbo.enabled so Catalyst can reorder multi-join queries
      by cost instead of left-deep order of appearance.
    detailed_recommendation: |
      Catalyst's default join ordering is left-deep: it joins tables in the order
      they appear in the query. With Cost-Based Optimization (CBO) disabled,
      Catalyst has no statistics on table sizes and cannot reorder joins to
      minimize intermediate result size. For a three-table star join where dimension
      tables vary from 1K to 100M rows, the difference between best and worst join
      order can be several orders of magnitude in shuffle data. Enable CBO with
      `spark.sql.cbo.enabled = true` and `spark.sql.statistics.histogram.enabled =
      true`, then collect table statistics: run `ANALYZE TABLE t COMPUTE STATISTICS
      FOR ALL COLUMNS` on the tables involved in complex joins. CBO is most
      impactful when queries have 3+ joins, table sizes differ significantly, or
      some joins are highly selective.
    before_code: |
      # CBO off — Catalyst joins in left-deep declaration order regardless of sizes
      spark = SparkSession.builder.appName("analytics").getOrCreate()
      result = facts.join(huge_dim, 'key_a').join(tiny_dim, 'key_b')
    after_code: |
      spark = (
          SparkSession.builder
          .appName("analytics")
          .config("spark.sql.cbo.enabled", "true")
          .config("spark.sql.statistics.histogram.enabled", "true")
          .getOrCreate()
      )
      # Then analyze tables once:
      # spark.sql("ANALYZE TABLE facts COMPUTE STATISTICS FOR ALL COLUMNS")
      result = facts.join(huge_dim, 'key_a').join(tiny_dim, 'key_b')
    config_changes:
      spark.sql.cbo.enabled: "true"
      spark.sql.statistics.histogram.enabled: "true"
    spark_docs_link: "https://spark.apache.org/docs/latest/sql-performance-tuning.html#cost-based-optimizer-framework"
    estimated_speedup: "Orders of magnitude for suboptimal join order on skewed-size tables"
    effort: CONFIG_ONLY
    common_in: "Multi-join analytical queries, star/snowflake schema ETL, BI reporting pipelines"

  # ---------------------------------------------------------------------------
  # D04 — Partitioning (SPL-D04-001 through SPL-D04-010)
  # ---------------------------------------------------------------------------

  - rule_id: SPL-D04-001
    short_recommendation: >-
      Remove repartition(1); it collapses the entire dataset to one task,
      eliminating all cluster parallelism and causing GC pressure.
    detailed_recommendation: |
      `repartition(1)` triggers a full shuffle and then funnels the entire dataset
      through a single reducer task. On any non-trivial dataset this means one
      executor core handles all work while the rest of the cluster sits idle, the
      single partition must fit entirely in one executor's JVM heap (causing GC
      pressure), and a single task failure forces re-shuffling the full dataset
      from scratch. The only legitimate use is writing a single output file for
      a downstream system that cannot read multi-part output. Even then, use
      `coalesce(1)` instead — it achieves the same result without the upfront
      shuffle cost. For larger data, let Spark manage partition count or set
      `spark.sql.shuffle.partitions` to `2-3 × total executor cores`.
    before_code: |
      # Single-task bottleneck — entire cluster except one core sits idle
      df.repartition(1).write.parquet('s3://bucket/output/')
    after_code: |
      # Option A: let Spark decide partition count (uses spark.sql.shuffle.partitions)
      df.write.parquet('s3://bucket/output/')

      # Option B: if a single output file is truly required, use coalesce (no shuffle)
      df.coalesce(1).write.parquet('s3://bucket/output/single_file.parquet')
    config_changes: null
    spark_docs_link: "https://spark.apache.org/docs/latest/rdd-programming-guide.html#parallelized-collections"
    estimated_speedup: "Full cluster parallelism restored; up to N× where N = executor core count"
    effort: MINOR_CODE_CHANGE
    common_in: "Legacy ETL scripts, single-file export jobs, Jupyter notebook prototypes"

  - rule_id: SPL-D04-002
    short_recommendation: >-
      Move coalesce(1) to the very last step before .write, or remove it
      entirely if it precedes further transformations.
    detailed_recommendation: |
      `coalesce(1)` merges all partitions onto a single task without a shuffle.
      Unlike `repartition(1)`, it avoids the upfront shuffle cost, but the result
      is the same: one enormous partition processed by a single executor core.
      When used before further transformations (filters, joins, aggregations), it
      destroys parallelism for all subsequent stages and should always be removed
      or replaced with a smaller-but-not-one count. The only acceptable use is
      immediately before a `.write` when a single output file is genuinely required
      by a downstream system. In that case, place `coalesce(1)` as the absolute
      last step so it does not affect any computation. For uniform output file
      sizes, prefer `repartition(n)` over `coalesce(n)` — the even distribution
      makes downstream reads more predictable.
    before_code: |
      # coalesce before aggregation — single-core groupBy on the full dataset
      df.coalesce(1).groupBy('category').agg(sum('revenue').alias('total'))
    after_code: |
      # Remove coalesce before transformations; only use it before write if needed
      df.groupBy('category').agg(sum('revenue').alias('total'))

      # If single output file is required, coalesce at the very end:
      # df.groupBy('category').agg(sum('revenue').alias('total')).coalesce(1).write.csv(...)
    config_changes: null
    spark_docs_link: "https://spark.apache.org/docs/latest/api/python/reference/pyspark.sql/api/pyspark.sql.DataFrame.coalesce.html"
    estimated_speedup: "Restores full parallelism for downstream stages; up to N× speedup"
    effort: MINOR_CODE_CHANGE
    common_in: "Single-file export jobs, legacy HDFS write patterns, Jupyter notebook prototypes"

  - rule_id: SPL-D04-003
    short_recommendation: >-
      Reduce repartition() count below 10,000; extremely high values cause
      millions of shuffle files and driver scheduling overhead.
    detailed_recommendation: |
      Each Spark partition corresponds to one task, and each task writes its own
      shuffle output file. Creating tens of thousands of partitions from a single
      `repartition()` call causes: the driver must track and schedule every task,
      consuming significant CPU and memory even before data is processed; with
      50,000 tasks × 200 executors = 10 million shuffle files for a single stage;
      Spark's speculative execution scans all task statuses periodically, making
      the O(n) scan slow for huge task counts. Target 128-256 MB of input data
      per partition as a practical guideline — for most workloads this means
      partition counts in the hundreds to low thousands. Enable AQE
      (`spark.sql.adaptive.enabled = true`) to automatically coalesce small
      post-shuffle partitions if you prefer to over-partition and let the runtime
      tune down.
    before_code: |
      # 50,000 tasks — millions of shuffle files, driver OOM risk
      df.repartition(50_000).write.parquet('s3://bucket/output/')
    after_code: |
      # ~128 MB per partition at 50 GB data with AQE auto-coalesce
      df.repartition(400).write.parquet('s3://bucket/output/')
    config_changes:
      spark.sql.adaptive.enabled: "true"
    spark_docs_link: "https://spark.apache.org/docs/latest/sql-performance-tuning.html#adaptive-query-execution"
    estimated_speedup: "Prevents driver OOM; eliminates millions of tiny shuffle files"
    effort: MINOR_CODE_CHANGE
    common_in: "Large-scale data ingestion, over-partitioned legacy jobs, automated partition sizing"

  - rule_id: SPL-D04-004
    short_recommendation: >-
      Increase repartition() count to at least 10 (ideally 2-3× executor cores)
      to utilize the full cluster for downstream operations.
    detailed_recommendation: |
      Repartitioning to a very low number of partitions (2-9) caps parallelism
      for all downstream stages to that number. On a 100-core cluster,
      `repartition(4)` means at most 4 tasks run simultaneously — 96 cores sit
      idle, stage duration scales inversely, and data skew within the few
      partitions causes long-tail stragglers. Low partition counts are sometimes
      intentional for very small DataFrames (< 100 MB) where task-scheduling
      overhead exceeds computation cost. For anything larger, partition to at
      least `2-3 × total executor cores`. If the DataFrame is genuinely small
      enough that a handful of partitions is correct, document that with a comment
      so future readers do not flag it as a mistake. Consider removing the
      `repartition()` call entirely and relying on `spark.sql.shuffle.partitions`.
    before_code: |
      # 4 partitions on a 100-core cluster — 96 cores idle
      df.repartition(4).groupBy('region').agg(sum('sales'))
    after_code: |
      # 200 partitions — 100 cores fully utilized
      df.repartition(200).groupBy('region').agg(sum('sales'))
    config_changes: null
    spark_docs_link: "https://spark.apache.org/docs/latest/configuration.html#execution-behavior"
    estimated_speedup: "Up to N× where N = cores / old_partitions; 25x for repartition(4) on 100 cores"
    effort: MINOR_CODE_CHANGE
    common_in: "Prototype scripts, manually tuned jobs, data-size-unaware partition settings"

  - rule_id: SPL-D04-005
    short_recommendation: >-
      Replace coalesce(n) before write with repartition(n) to produce
      evenly-sized output files; coalesce creates unbalanced partitions.
    detailed_recommendation: |
      `coalesce(n)` reduces partition count by merging existing partitions without
      redistributing data. When used before a write, the resulting output files are
      unbalanced: merged partitions produce a few very large files alongside smaller
      ones. This degrades downstream reader performance (Spark, Presto, Athena)
      because a large merged file forces one task to read the entire partition
      sequentially rather than splitting at block boundaries. S3/GCS listing
      performance also degrades with a mix of huge and tiny files in the same
      prefix. Use `repartition(n)` before write when uniform output file sizes
      matter — it costs one extra shuffle but guarantees evenly-sized output.
      Exception: `coalesce(1)` for a single-file write is covered by SPL-D04-002.
    before_code: |
      # Unbalanced output: some files huge, others tiny
      df.coalesce(20).write.mode('overwrite').parquet('s3://bucket/output/')
    after_code: |
      # Even output files — one extra shuffle, but uniform downstream read performance
      df.repartition(20).write.mode('overwrite').parquet('s3://bucket/output/')
    config_changes: null
    spark_docs_link: "https://spark.apache.org/docs/latest/api/python/reference/pyspark.sql/api/pyspark.sql.DataFrame.coalesce.html"
    estimated_speedup: "Even file sizes; prevents downstream read skew and long-tail query stragglers"
    effort: MINOR_CODE_CHANGE
    common_in: "Data lake writes, output file size management, Parquet/ORC sink jobs"

  - rule_id: SPL-D04-006
    short_recommendation: >-
      Add partitionBy() to Parquet/ORC/Delta writes so downstream queries can
      prune to relevant partitions instead of scanning the full table.
    detailed_recommendation: |
      Writing analytics data without a `partitionBy` clause places all output in a
      single directory. Readers that filter on common columns (date, region,
      status) must scan every file rather than pruning to a relevant subset.
      Partition pruning is one of the highest-impact Spark optimizations:
      partitioning a 10 TB table by `date` and filtering on a single day reduces
      the scan from 10 TB to ~27 GB (assuming 3 years of data) — a 370× reduction.
      Choose partition columns that are low-cardinality (hundreds to low thousands
      of distinct values), aligned with the most common query filter predicates,
      and not too granular (`date` is good; `timestamp` creates millions of tiny
      files). Avoid high-cardinality columns like user IDs or UUIDs — use
      SPL-D04-007 guidance to check for that anti-pattern.
    before_code: |
      # No partition structure — every query scans the full table
      df.write.mode('overwrite').parquet('s3://datalake/events/')
    after_code: |
      # Partition by date and region — most queries touch <1% of files
      df.write.partitionBy('date', 'region').mode('overwrite').parquet('s3://datalake/events/')
    config_changes: null
    spark_docs_link: "https://spark.apache.org/docs/latest/sql-data-sources-parquet.html#partition-discovery"
    estimated_speedup: "10-1000x read reduction for filtered queries via partition pruning"
    effort: MINOR_CODE_CHANGE
    common_in: "Data lake writes, analytical tables, event ingestion pipelines, Delta Lake tables"

  - rule_id: SPL-D04-007
    short_recommendation: >-
      Replace high-cardinality partition columns (e.g., *_id, *_at) with
      low-cardinality equivalents; high cardinality creates millions of tiny files.
    detailed_recommendation: |
      Partitioning by a high-cardinality column (one with thousands to millions
      of distinct values) causes the small-files problem. Each distinct partition
      value becomes a directory: with 10 M distinct `user_id` values × 200 Spark
      tasks, the result can be millions of output files. Object storage charges
      per LIST/PUT operation — millions of tiny files dramatically increase cost
      and latency. The Spark driver OOMs when listing partition directories of
      partitioned tables with millions of partitions. Use low-cardinality columns
      instead: `date` instead of `timestamp`, `user_segment` instead of `user_id`,
      `event_category` instead of `event_id`. If the high-cardinality column is
      the primary join/lookup key, use `bucketBy` instead of `partitionBy` —
      bucketing pre-distributes rows by key hash into a fixed number of files
      (e.g., 256 buckets) without creating a separate directory per value.
    before_code: |
      # user_id has 10M distinct values → millions of tiny files
      df.write.partitionBy('user_id').mode('overwrite').parquet('s3://datalake/events/')
    after_code: |
      # Low-cardinality date+region → manageable partition count
      df.write.partitionBy('date', 'region').mode('overwrite').parquet('s3://datalake/events/')

      # If user_id lookups are needed, use bucketing instead:
      # df.write.bucketBy(256, 'user_id').sortBy('user_id').saveAsTable('events')
    config_changes: null
    spark_docs_link: "https://spark.apache.org/docs/latest/sql-data-sources-parquet.html#partition-discovery"
    estimated_speedup: "Prevents driver OOM on partition listing; eliminates millions of tiny files"
    effort: MINOR_CODE_CHANGE
    common_in: "User-level analytics tables, event streams, time-series data lakes"

  - rule_id: SPL-D04-008
    short_recommendation: >-
      Add bucketBy(n, 'join_key') before saveAsTable() so repeated joins on
      this table require zero shuffle — bucket co-partitioning is permanent.
    detailed_recommendation: |
      When writing a table that will be repeatedly joined (a fact table, a
      frequently-used dimension, or a lookup table), bucketing pre-distributes
      rows by the join key so that every subsequent join on that key requires
      zero shuffle. `bucketBy(n, 'join_key')` writes exactly `n` files per
      partition, sorted by the hash of `join_key`. When two bucketed tables share
      the same bucket count and key, Spark detects the pre-sorted co-partitioning
      and replaces the sort-merge join plan with a bucket join — no shuffle stage,
      no sort stage. Use a bucket count that is a power of 2 (e.g., 128 or 256)
      and consistent across all tables you join against. The `saveAsTable()` call
      writes to a Hive-compatible metastore location; ensure the warehouse
      directory is configured. The upfront write cost is higher, but the amortized
      shuffle savings dominate if the table is joined tens of times per day.
    before_code: |
      # Every join on this table triggers a full shuffle
      df.write.mode('overwrite').saveAsTable('fact_orders')
    after_code: |
      # Bucket by join key — subsequent joins on order_id require zero shuffle
      (
          df.write
          .bucketBy(256, 'order_id')
          .sortBy('order_id')
          .mode('overwrite')
          .saveAsTable('fact_orders')
      )
    config_changes: null
    spark_docs_link: "https://spark.apache.org/docs/latest/sql-data-sources-load-save-functions.html#bucketing-sorting-and-partitioning"
    estimated_speedup: "Eliminates shuffle on every subsequent join; amortized 10-100x over table lifetime"
    effort: MAJOR_REFACTOR
    common_in: "Fact tables, frequently-joined dimension tables, high-frequency analytical pipelines"

  - rule_id: SPL-D04-009
    short_recommendation: >-
      Add a filter() on the partition column before groupBy/distinct/orderBy
      to enable partition pruning and avoid a full table scan.
    detailed_recommendation: |
      Partitioned Parquet/ORC/Delta tables store their partition directory structure
      on disk. When a query includes a `filter()` on the partition column (e.g.,
      `WHERE date = '2024-01-01'`), Spark's partition pruning skips all irrelevant
      directories and reads only the matching data. When no such filter is present
      and the read flows directly into an expensive operation (`groupBy`, `distinct`,
      `orderBy`, `agg`), Spark must scan the entire table. On a multi-year history
      table this can mean scanning terabytes when only gigabytes are needed — a
      common cause of unexpectedly long job runtimes. Add `filter()` on the
      partition column before the expensive operation. Confirm pruning is active
      by checking the Spark UI Stage Detail "Input" bytes — it should reflect only
      the pruned partition size, not the full table size.
    before_code: |
      # Full table scan — reads all years of history
      spark.read.parquet('s3://datalake/events').groupBy('user_id').count()
    after_code: |
      # Partition pruning — reads only 2024-01-01 data
      (
          spark.read.parquet('s3://datalake/events')
          .filter("date = '2024-01-01'")
          .groupBy('user_id')
          .count()
      )
    config_changes: null
    spark_docs_link: "https://spark.apache.org/docs/latest/sql-data-sources-parquet.html#partition-discovery"
    estimated_speedup: "10-1000x data read reduction depending on filter selectivity"
    effort: MINOR_CODE_CHANGE
    common_in: "Datalake analytics, multi-year history tables, scheduled reporting queries"

  - rule_id: SPL-D04-010
    short_recommendation: >-
      Remove repartition() by a column that differs from the subsequent join key;
      the repartition is wasted because the join immediately re-shuffles.
    detailed_recommendation: |
      `df.repartition('col_a').join(other, 'col_b')` performs two full shuffles
      back-to-back: first `repartition('col_a')` shuffles data by col_a hash,
      then `join('col_b')` immediately re-shuffles by col_b hash to co-locate
      matching keys. The first shuffle is completely wasted because the join
      invalidates the partitioning before any computation benefits from it. Simply
      remove the `repartition()` call — the join already shuffles on the join key.
      The only time a pre-join `repartition` saves work is when the repartition
      key and the join key are the same column, and even then, Spark's exchange
      reuse (`spark.sql.exchange.reuse`, enabled by default) can achieve the same
      result without an explicit `repartition`. If pre-partitioning by the join
      key is the intent, use `repartition('join_key')` with the same column as
      the join and rely on exchange reuse.
    before_code: |
      # Two full shuffles: repartition by user_id, then join reshuffles by order_id
      result = df.repartition('user_id').join(orders, 'order_id')
    after_code: |
      # One shuffle: join on order_id handles co-location internally
      result = df.join(orders, 'order_id')
    config_changes: null
    spark_docs_link: "https://spark.apache.org/docs/latest/sql-performance-tuning.html"
    estimated_speedup: "Eliminates one full wasted shuffle; 2x shuffle I/O reduction for that stage"
    effort: MINOR_CODE_CHANGE
    common_in: "ETL join pipelines, manually-partitioned DataFrames, multi-key join chains"

  # ---------------------------------------------------------------------------
  # D05 — Data Skew (SPL-D05-001 through SPL-D05-007)
  # ---------------------------------------------------------------------------

  - rule_id: SPL-D05-001
    short_recommendation: >-
      Add a secondary high-cardinality key to the join; low-cardinality keys
      (status, type, is_*) route the dominant group to a single straggler task.
    detailed_recommendation: |
      When a join key has very few distinct values (status, type, is_active), all
      rows sharing a value must be processed by the same reducer task. If 80% of
      records have status = 'active', one task handles 80% of the data while the
      rest of the cluster finishes quickly — a classic straggler that blocks the
      entire stage. Unlike ID-based skew (which salting solves), low-cardinality
      join skew is structural: the key definition itself causes the imbalance.
      The most direct fix is adding a secondary high-cardinality key to the join
      condition: `join(other, ['status', 'user_id'])` breaks ties within each
      status group, spreading the load across many more tasks. Also enable AQE
      skew join splitting (`spark.sql.adaptive.skewJoin.enabled = true`) as a
      safety net so Spark can automatically split any oversized partitions at
      runtime even when the code pattern cannot be changed.
    before_code: |
      # All 'active' rows routed to one reducer task
      result = df.join(other, 'status')
    after_code: |
      # user_id breaks ties within each status group
      result = df.join(other, ['status', 'user_id'])
    config_changes:
      spark.sql.adaptive.enabled: "true"
      spark.sql.adaptive.skewJoin.enabled: "true"
    spark_docs_link: "https://spark.apache.org/docs/latest/sql-performance-tuning.html#adaptive-query-execution"
    estimated_speedup: "Eliminates straggler task; stage wall-clock time approaches median task time"
    effort: MINOR_CODE_CHANGE
    common_in: "Status-based joins, event-type partitioning, boolean-flag joins"

  - rule_id: SPL-D05-002
    short_recommendation: >-
      Use two-phase aggregation with a random bucket column to distribute the
      dominant group across tasks before the final groupBy rollup.
    detailed_recommendation: |
      `groupBy('status')` routes all rows with the same status to a single
      partition. If 90% of rows are status = 'active', that reducer task runs
      for the entire stage while all others finish seconds earlier. Unlike join
      skew, you cannot simply add a secondary key because the aggregation must
      see all rows for each group to produce a correct result. The two-phase
      aggregation pattern solves this: first aggregate by `(status, rand_bucket)`
      to distribute the computation across many partial-sum tasks, then aggregate
      the partial results by `status` alone. The total work increases by one extra
      groupBy pass, but each individual task handles a proportional slice of the
      data. Also enable `spark.sql.adaptive.skewJoin.enabled = true` — Spark 3.2+
      AQE can split skewed groupBy partitions automatically using the same
      mechanism as skew join splitting.
    before_code: |
      # 90% of rows in one partition — straggler task
      result = df.groupBy('status').agg(sum('amount').alias('total'))
    after_code: |
      from pyspark.sql.functions import rand, sum as _sum

      N = 10  # number of salt buckets
      # Phase 1: partial sums distributed across N buckets per status
      partial = (
          df.withColumn('bucket', (rand() * N).cast('int'))
          .groupBy('status', 'bucket')
          .agg(_sum('amount').alias('partial_total'))
      )
      # Phase 2: roll up partial sums — each status now has N small inputs
      result = partial.groupBy('status').agg(_sum('partial_total').alias('total'))
    config_changes:
      spark.sql.adaptive.enabled: "true"
      spark.sql.adaptive.skewJoin.enabled: "true"
    spark_docs_link: "https://spark.apache.org/docs/latest/sql-performance-tuning.html#adaptive-query-execution"
    estimated_speedup: "10-100x stage speedup for dominant groups; eliminates straggler"
    effort: MAJOR_REFACTOR
    common_in: "Status-based aggregations, boolean-flag rollups, categorical groupBy ETL"

  - rule_id: SPL-D05-003
    short_recommendation: >-
      Re-enable spark.sql.adaptive.skewJoin.enabled; disabling it removes
      Spark 3's automatic skewed-partition splitting safety net.
    detailed_recommendation: |
      Spark 3.0+ Adaptive Query Execution includes an automatic skew join
      optimization that detects partitions larger than
      `skewedPartitionThresholdInBytes × skewedPartitionFactor` and automatically
      splits them across multiple tasks — the lowest-effort skew fix available.
      Disabling AQE entirely (`spark.sql.adaptive.enabled = false`) or the skew
      join feature specifically (`spark.sql.adaptive.skewJoin.enabled = false`)
      removes this safety net, turning every skewed join into a long-running
      straggler that blocks the stage. The feature was occasionally disabled in
      early Spark 3.0 betas due to incorrect plan rewrites, but has been stable
      since Spark 3.1. Remove the `false` override and set both
      `spark.sql.adaptive.enabled = true` and
      `spark.sql.adaptive.skewJoin.enabled = true`.
    before_code: |
      spark = (
          SparkSession.builder
          .config("spark.sql.adaptive.skewJoin.enabled", "false")
          .getOrCreate()
      )
    after_code: |
      spark = (
          SparkSession.builder
          .config("spark.sql.adaptive.enabled", "true")
          .config("spark.sql.adaptive.skewJoin.enabled", "true")
          .getOrCreate()
      )
    config_changes:
      spark.sql.adaptive.enabled: "true"
      spark.sql.adaptive.skewJoin.enabled: "true"
    spark_docs_link: "https://spark.apache.org/docs/latest/sql-performance-tuning.html#skew-join-optimization"
    estimated_speedup: "Restores automatic skew splitting; eliminates straggler tasks on skewed joins"
    effort: CONFIG_ONLY
    common_in: "Any job with joins on skew-prone keys, Spark 3.0 era codebases"

  - rule_id: SPL-D05-004
    short_recommendation: >-
      Lower skewedPartitionThresholdInBytes to ≤256 MB and skewedPartitionFactor
      to ≤5 so AQE detects moderate skew, not only extreme outliers.
    detailed_recommendation: |
      AQE's skew join optimization uses two thresholds: a partition is considered
      skewed only when it is both above `skewedPartitionThresholdInBytes` (default
      256 MB) AND larger than `skewedPartitionFactor × median partition size`
      (default factor 5). Setting the byte threshold above 1 GB means partitions
      between 256 MB and 1 GB — already causing significant straggler behaviour
      relative to a 50 MB median — go undetected. Setting the factor above 10
      requires a partition to be 10× the median before AQE intervenes, missing
      moderate but still harmful skew. Keep both at or below their defaults:
      `skewedPartitionThresholdInBytes = 256m` and `skewedPartitionFactor = 5`.
      Lower values make AQE more aggressive at splitting skewed partitions; the
      only downside is a small additional AQE planning overhead per stage, which
      is negligible compared to straggler runtime.
    before_code: |
      spark = (
          SparkSession.builder
          # Only partitions > 2 GB are considered skewed — misses moderate skew
          .config("spark.sql.adaptive.skewJoin.skewedPartitionThresholdInBytes", "2g")
          .config("spark.sql.adaptive.skewJoin.skewedPartitionFactor", "20")
          .getOrCreate()
      )
    after_code: |
      spark = (
          SparkSession.builder
          .config("spark.sql.adaptive.skewJoin.skewedPartitionThresholdInBytes", "256m")
          .config("spark.sql.adaptive.skewJoin.skewedPartitionFactor", "5")
          .getOrCreate()
      )
    config_changes:
      spark.sql.adaptive.skewJoin.skewedPartitionThresholdInBytes: "268435456"  # 256 MB
      spark.sql.adaptive.skewJoin.skewedPartitionFactor: "5"
    spark_docs_link: "https://spark.apache.org/docs/latest/sql-performance-tuning.html#skew-join-optimization"
    estimated_speedup: "Detects and splits moderate skew that previously ran as stragglers"
    effort: CONFIG_ONLY
    common_in: "All jobs with AQE enabled on skew-prone data distributions"

  - rule_id: SPL-D05-005
    short_recommendation: >-
      Enable AQE skew join first; if skew persists on power-law ID columns
      (user_id, product_id), implement key salting to distribute whale keys.
    detailed_recommendation: |
      Columns like user_id, customer_id, and product_id often follow power-law
      distributions: a handful of whale users generate millions of events, and
      a handful of popular products receive most orders. When joining a fact table
      on such a column, the reducer tasks for popular IDs receive far more rows
      than average, causing straggler tasks. Start by enabling AQE skew join
      (`spark.sql.adaptive.skewJoin.enabled = true`) — it handles many cases
      automatically with zero code changes. If skew persists (confirm via Spark
      UI Stage Detail → task duration distribution), implement salting: append a
      random bucket number (0–N) to the join key so one popular ID is distributed
      across N tasks. The larger table gets a `salt` column via `rand()`, the
      smaller lookup table is exploded into N copies (one per salt value), and the
      join is performed on `(original_key, salt)`.
    before_code: |
      # user_id may be highly skewed — whale users dominate one reducer
      result = events.join(user_profiles, 'user_id')
    after_code: |
      from pyspark.sql.functions import rand, explode, array, lit

      N = 10  # salt buckets — tune based on skew severity
      events_salted = events.withColumn('salt', (rand() * N).cast('int'))
      profiles_salted = user_profiles.withColumn(
          'salt', explode(array([lit(i) for i in range(N)]))
      )
      result = events_salted.join(profiles_salted, ['user_id', 'salt'])
    config_changes:
      spark.sql.adaptive.enabled: "true"
      spark.sql.adaptive.skewJoin.enabled: "true"
    spark_docs_link: "https://spark.apache.org/docs/latest/sql-performance-tuning.html#skew-join-optimization"
    estimated_speedup: "N× reduction in straggler task size where N = salt bucket count"
    effort: MAJOR_REFACTOR
    common_in: "User-level fact joins, product analytics, social graph traversals"

  - rule_id: SPL-D05-006
    short_recommendation: >-
      Add a secondary high-cardinality key to Window.partitionBy() on low-
      cardinality columns; skewed window partitions cause executor OOM.
    detailed_recommendation: |
      `Window.partitionBy('status')` sends all rows with the same status to the
      same executor task, which must buffer and sort the entire partition in memory
      to compute the window function. Unlike join skew (where AQE can split the
      partition after the shuffle), window function partitions cannot be
      parallelised within a partition — the full sorted window must be held in
      memory at once. A skewed window partition on a 90%-dominant status value
      routinely causes executor OOM that is hard to reproduce in staging
      environments. Add a secondary high-cardinality key to bound each partition
      to a manageable size: `Window.partitionBy('status', 'user_id').orderBy('ts')`
      limits each partition to one user's rows within a given status, rather than
      all rows across every user with that status.
    before_code: |
      from pyspark.sql import Window
      from pyspark.sql.functions import rank

      # All 'active' rows in one memory-bound partition
      w = Window.partitionBy('status').orderBy('ts')
      df.withColumn('rnk', rank().over(w))
    after_code: |
      from pyspark.sql import Window
      from pyspark.sql.functions import rank

      # Each partition now bounded to one user's rows within a status
      w = Window.partitionBy('status', 'user_id').orderBy('ts')
      df.withColumn('rnk', rank().over(w))
    config_changes: null
    spark_docs_link: "https://spark.apache.org/docs/latest/api/python/reference/pyspark.sql/api/pyspark.sql.Window.partitionBy.html"
    estimated_speedup: "Prevents executor OOM; window stage runs in bounded memory per partition"
    effort: MINOR_CODE_CHANGE
    common_in: "Sessionization, ranking pipelines, time-series windowed aggregations"

  - rule_id: SPL-D05-007
    short_recommendation: >-
      Filter isNotNull() on nullable foreign-key join columns before joining;
      all null-key rows hash to the same partition causing null-bucket skew.
    detailed_recommendation: |
      In Spark, NULL values do not match each other in inner joins, but they do
      hash to the same constant bucket because `hash(NULL)` is deterministic and
      fixed. When a join key column contains millions of null rows (common for
      nullable foreign keys such as `parent_id` for root records, `manager_id`
      for top-level managers, or `referred_by` for organic users), all those rows
      are routed to the same reducer partition, creating a single massively
      oversized task. Filter out nulls before the join:
      `df.filter(col('parent_id').isNotNull()).join(other, 'parent_id')`. If null
      keys must be preserved in the result, use a left join and handle the nulls
      explicitly in the output rather than allowing them to pollute the shuffle
      key distribution.
    before_code: |
      # parent_id is NULL for root-level records — all nulls go to one partition
      result = items.join(parents, 'parent_id')
    after_code: |
      from pyspark.sql.functions import col

      # Filter nulls before join — null rows handled separately if needed
      result = (
          items.filter(col('parent_id').isNotNull())
          .join(parents, 'parent_id')
      )
    config_changes: null
    spark_docs_link: "https://spark.apache.org/docs/latest/sql-ref-null-semantics.html"
    estimated_speedup: "Eliminates null-bucket straggler; stage time proportional to non-null data"
    effort: MINOR_CODE_CHANGE
    common_in: "Hierarchical data joins, optional FK relationships, CDC merge pipelines"

  # ---------------------------------------------------------------------------
  # D06 — Caching and Persistence (SPL-D06-001 through SPL-D06-008)
  # ---------------------------------------------------------------------------

  - rule_id: SPL-D06-001
    short_recommendation: >-
      Add df.unpersist() after each cache()/persist(); without it, cached
      blocks remain pinned for the SparkContext lifetime and leak executor memory.
    detailed_recommendation: |
      Every `cache()` or `persist()` call pins the DataFrame's RDD partitions in
      executor memory (and optionally disk). If `unpersist()` is never called,
      those blocks remain pinned for the lifetime of the SparkContext. In a
      long-running job or shared notebook this causes memory pressure, evictions
      of other cached DataFrames, and ultimately OOM errors. The pattern is
      especially dangerous in notebooks where the SparkContext lives for hours and
      cells are re-run frequently. Always pair each `cache()` / `persist()` with
      an `unpersist()` call once the DataFrame is no longer needed. Call `count()`
      or another action immediately after `cache()` to materialize the cache
      eagerly, then call `unpersist()` at the end of the scope where the DataFrame
      is used.
    before_code: |
      # Cached blocks pinned indefinitely — memory leak
      df_joined = customers.join(orders, 'customer_id').cache()
      result = df_joined.groupBy('region').agg(sum('amount'))
      result.write.parquet('s3://bucket/output/')
    after_code: |
      df_joined = customers.join(orders, 'customer_id').cache()
      df_joined.count()  # materialize eagerly

      result = df_joined.groupBy('region').agg(sum('amount'))
      result.write.parquet('s3://bucket/output/')

      df_joined.unpersist()  # release memory when done
    config_changes: null
    spark_docs_link: "https://spark.apache.org/docs/latest/rdd-programming-guide.html#which-storage-level-to-choose"
    estimated_speedup: "Prevents OOM; releases memory for other stages and concurrent jobs"
    effort: MINOR_CODE_CHANGE
    common_in: "Long-running notebooks, multi-stage ETL, iterative analytical jobs"

  - rule_id: SPL-D06-002
    short_recommendation: >-
      Remove cache() on DataFrames consumed only once; caching adds a
      serialization pass and memory overhead with no recomputation benefit.
    detailed_recommendation: |
      `cache()` / `persist()` is valuable only when a DataFrame is consumed
      multiple times — it avoids recomputing the same pipeline on each action.
      When a DataFrame is used only once after caching, the cache write itself
      (an extra pass through the data plus serialization to the block manager)
      makes the job strictly slower and uses memory that other stages need. Common
      causes: defensive caching of every intermediate step "just in case", or
      caching added during development that became unnecessary after a refactor
      reduced downstream consumers to one. Remove the `cache()` call entirely.
      The Spark catalyst optimizer and pipelining will handle the single-use
      execution more efficiently without the intermediate materialization.
    before_code: |
      # Cached once and used once — net negative
      df_agg = df.groupBy('category').agg(sum('revenue').alias('total')).cache()
      df_agg.write.parquet('s3://bucket/output/')  # only use
    after_code: |
      # No cache — one pass through the data, no serialization overhead
      df.groupBy('category').agg(sum('revenue').alias('total')).write.parquet('s3://bucket/output/')
    config_changes: null
    spark_docs_link: "https://spark.apache.org/docs/latest/rdd-programming-guide.html#which-storage-level-to-choose"
    estimated_speedup: "Eliminates unnecessary serialization pass; frees memory for active stages"
    effort: MINOR_CODE_CHANGE
    common_in: "Defensive coding patterns, iterative notebook development, refactored pipelines"

  - rule_id: SPL-D06-003
    short_recommendation: >-
      Move cache()/persist() outside the loop or replace with checkpoint()
      inside it; each iteration accumulates cached blocks until OOM.
    detailed_recommendation: |
      Each `cache()` / `persist()` call inside a loop creates a new pinned RDD
      in executor memory. Without an `unpersist()` inside the same iteration,
      every loop pass accumulates more cached blocks until the executor exhausts
      its storage fraction. Even when `unpersist()` is present, the pattern is
      fragile: an early exit (exception, `break`) leaves the last iteration's
      cache pinned. For iterative algorithms (ML training, graph processing) use
      `checkpoint()` inside the loop instead — it truncates the DAG lineage so
      the plan does not grow unboundedly across iterations, and the checkpoint
      directory on HDFS/S3 acts as a natural materialization. Call `unpersist()`
      at the start of each iteration to release the previous one. If the same
      DataFrame is reused across all iterations unchanged, cache it once before
      the loop.
    before_code: |
      # Each iteration adds a new cached RDD — OOM after O(N) iterations
      for epoch in range(100):
          df = model.transform(df).cache()
          loss = df.agg(mean('loss')).collect()[0][0]
    after_code: |
      sc.setCheckpointDir('s3://bucket/checkpoints/')

      for epoch in range(100):
          prev = df
          df = model.transform(df)
          if epoch % 10 == 0:
              df = df.checkpoint()  # truncate lineage every 10 epochs
          prev.unpersist()

          loss = df.agg(mean('loss')).collect()[0][0]
    config_changes: null
    spark_docs_link: "https://spark.apache.org/docs/latest/rdd-programming-guide.html#rdd-persistence"
    estimated_speedup: "Prevents OOM accumulation; bounded memory use regardless of loop iterations"
    effort: MAJOR_REFACTOR
    common_in: "Iterative ML training, graph algorithm loops, incremental ETL loops"

  - rule_id: SPL-D06-004
    short_recommendation: >-
      Push filter()/where() before cache() so only the relevant subset is
      stored; caching then filtering wastes memory on discarded rows.
    detailed_recommendation: |
      When `cache()` / `persist()` is called before `filter()` / `where()`, Spark
      caches the full unfiltered dataset and re-applies the filter on every
      downstream action. This wastes memory proportional to the rows removed by
      the filter — if the filter removes 90% of rows, 90% of the cache allocation
      holds data that is immediately discarded. The fix is mechanical: swap the
      order so `filter()` runs first, then `cache()` stores only the relevant
      subset. This also improves downstream performance because all subsequent
      operations on the cached DataFrame work with a smaller, already-filtered
      dataset. Filtering early is one of the most impactful general Spark
      optimizations: it reduces data volume for every downstream operation,
      not just the cached copy.
    before_code: |
      # Caches all rows; filter discards 95% of them on every downstream action
      active_users = df.cache().filter('status = "active"')
      count1 = active_users.count()
      revenue = active_users.agg(sum('amount')).collect()
    after_code: |
      # Cache only active users — 95% memory saving
      active_users = df.filter('status = "active"').cache()
      active_users.count()  # materialize

      count1 = active_users.count()
      revenue = active_users.agg(sum('amount')).collect()
      active_users.unpersist()
    config_changes: null
    spark_docs_link: "https://spark.apache.org/docs/latest/sql-performance-tuning.html"
    estimated_speedup: "Up to filter-selectivity × cache-size memory saving; faster downstream reads"
    effort: MINOR_CODE_CHANGE
    common_in: "Multi-action analytical pipelines, filtered aggregation ETL, reporting jobs"

  - rule_id: SPL-D06-005
    short_recommendation: >-
      Replace persist(MEMORY_ONLY) with persist(MEMORY_AND_DISK) to fall back
      to disk instead of silently recomputing evicted partitions.
    detailed_recommendation: |
      `StorageLevel.MEMORY_ONLY` (the default for RDD `cache()`) evicts partitions
      when the executor's storage fraction is exhausted. Evicted partitions are
      silently recomputed from scratch on the next access — no warning, no
      exception, just a performance cliff that is difficult to diagnose. For large
      datasets this can turn what looked like a cache hit into a full pipeline
      recomputation, negating the caching benefit entirely while still occupying
      partial memory. `MEMORY_AND_DISK` spills evicted partitions to disk instead,
      providing a safety net at the cost of disk I/O — always preferable to silent
      recomputation. `MEMORY_AND_DISK_SER` further reduces the memory footprint by
      serializing objects before storage, trading CPU for memory. Note: DataFrame
      `cache()` (without explicit StorageLevel) already uses `MEMORY_AND_DISK` by
      default; this finding only fires when `MEMORY_ONLY` is set explicitly via
      `persist()`.
    before_code: |
      from pyspark import StorageLevel

      # Evicted partitions are recomputed silently — no disk fallback
      df.persist(StorageLevel.MEMORY_ONLY)
    after_code: |
      from pyspark import StorageLevel

      # Evicted partitions spill to disk instead of recomputing
      df.persist(StorageLevel.MEMORY_AND_DISK)

      # For memory-constrained environments with CPU headroom:
      # df.persist(StorageLevel.MEMORY_AND_DISK_SER)
    config_changes: null
    spark_docs_link: "https://spark.apache.org/docs/latest/rdd-programming-guide.html#which-storage-level-to-choose"
    estimated_speedup: "Prevents silent full-pipeline recomputation under memory pressure"
    effort: MINOR_CODE_CHANGE
    common_in: "RDD-based ML pipelines, large dataset caching, memory-constrained cluster jobs"

  - rule_id: SPL-D06-006
    short_recommendation: >-
      Add .cache() after the expensive transformation when the DataFrame is
      used multiple times; each use without caching recomputes the full lineage.
    detailed_recommendation: |
      When a DataFrame variable built from an expensive operation (join,
      aggregation, wide shuffle) is used as the receiver of multiple actions or
      transformations, Spark recomputes its full lineage for each action. Two
      downstream uses of `df_agg = df.groupBy('id').agg(sum('v'))` trigger two
      full aggregations and two full shuffles. Add `.cache()` immediately after
      the expensive transformation to materialize the result once, then trigger
      materialization with an action (`count()` is idiomatic). Call `unpersist()`
      when the DataFrame is no longer needed to release the memory. The pattern
      is especially impactful when the lineage includes multiple joins or shuffle
      stages — the recomputation cost is the sum of all upstream stages, not just
      the last transformation.
    before_code: |
      # Two full aggregations + two full shuffles
      df_agg = df.groupBy('customer_id').agg(sum('revenue').alias('total'))
      report = df_agg.join(segments, 'customer_id')   # recomputes df_agg
      total = df_agg.count()                          # recomputes df_agg again
    after_code: |
      # One aggregation + one shuffle; both consumers read from cache
      df_agg = df.groupBy('customer_id').agg(sum('revenue').alias('total')).cache()
      df_agg.count()  # materialize eagerly

      report = df_agg.join(segments, 'customer_id')
      total = df_agg.count()
      df_agg.unpersist()
    config_changes: null
    spark_docs_link: "https://spark.apache.org/docs/latest/rdd-programming-guide.html#rdd-persistence"
    estimated_speedup: "N-fold reduction where N = number of downstream uses of the cached DataFrame"
    effort: MINOR_CODE_CHANGE
    common_in: "Multi-output ETL, fan-out pipelines, report generation with multiple aggregations"

  - rule_id: SPL-D06-007
    short_recommendation: >-
      Verify the repartitioned DataFrame is used 2+ times before caching it;
      if used once, remove cache() to avoid a redundant serialization pass.
    detailed_recommendation: |
      `repartition()` already triggers a full shuffle — an expensive distributed
      sort. Caching the result immediately afterward with `cache()` / `persist()`
      is beneficial only when the repartitioned DataFrame is consumed multiple
      times downstream, because it avoids re-running the shuffle on each action.
      If the repartitioned DataFrame is used only once, the cache write is pure
      overhead: an extra serialization pass and memory allocation on top of an
      already-expensive shuffle. Check the code for downstream uses of the cached
      variable: if only one action or transformation follows, remove `cache()`.
      If two or more uses follow, the cache is justified and this finding can be
      suppressed with a comment. This rule is INFO-level specifically because the
      pattern can be correct — it requires human judgment to confirm whether
      multiple uses exist.
    before_code: |
      # repartition + cache, but df2 is only used once
      df2 = df.repartition(200, 'key').cache()
      result = df2.groupBy('key').agg(sum('val'))  # only downstream use
    after_code: |
      # Single use — remove cache, let the repartition feed directly into groupBy
      result = df.repartition(200, 'key').groupBy('key').agg(sum('val'))

      # If df2 IS used multiple times, cache is justified:
      # df2 = df.repartition(200, 'key').cache()
      # use1 = df2.join(other, 'key')
      # use2 = df2.count()
    config_changes: null
    spark_docs_link: "https://spark.apache.org/docs/latest/rdd-programming-guide.html#rdd-persistence"
    estimated_speedup: "Eliminates serialization pass after an already-expensive shuffle"
    effort: MINOR_CODE_CHANGE
    common_in: "Pre-join repartitioning, output preparation pipelines, manually tuned shuffle counts"

  - rule_id: SPL-D06-008
    short_recommendation: >-
      Replace checkpoint() with cache() in non-iterative code; checkpoint always
      writes to disk and provides no benefit outside iterative DAG growth.
    detailed_recommendation: |
      `checkpoint()` saves a DataFrame to HDFS / the checkpoint directory and
      truncates the DAG lineage up to that point. It is designed specifically for
      iterative algorithms (ML training loops, graph processing) where the lineage
      grows unboundedly across iterations and eventually causes stack overflows or
      OOM in the Catalyst planner. In non-iterative code the DAG is bounded
      regardless — lineage truncation provides no benefit, and `checkpoint()` is
      strictly slower than `cache()` because it always writes to disk, requires
      a SparkContext checkpoint directory to be configured, and the write is
      blocking (it waits for the checkpoint to complete before proceeding). Replace
      it with `cache()` / `persist()` in non-iterative pipelines. If this code
      is inside an iterative loop (check the surrounding context), `checkpoint()`
      is correct and this finding should be suppressed.
    before_code: |
      # Non-iterative pipeline — checkpoint is unnecessary overhead
      df_enriched = (
          raw_events
          .join(users, 'user_id')
          .join(products, 'product_id')
          .checkpoint()  # writes to HDFS; no lineage problem to solve here
      )
      df_enriched.write.parquet('s3://bucket/output/')
    after_code: |
      # cache() is faster — no disk write, no checkpoint dir required
      df_enriched = (
          raw_events
          .join(users, 'user_id')
          .join(products, 'product_id')
          .cache()
      )
      df_enriched.count()  # materialize
      df_enriched.write.parquet('s3://bucket/output/')
      df_enriched.unpersist()
    config_changes: null
    spark_docs_link: "https://spark.apache.org/docs/latest/rdd-programming-guide.html#rdd-checkpointing"
    estimated_speedup: "Eliminates mandatory disk write; cache() reads from memory instead"
    effort: MINOR_CODE_CHANGE
    common_in: "Non-iterative ETL pipelines, data enrichment jobs, defensive checkpointing patterns"
